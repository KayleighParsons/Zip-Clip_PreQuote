<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zip-Clip PreQuote</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--orange:#ff8200;--dark:#3c3a3c;--odim:rgba(255,130,0,0.12);--oborder:rgba(255,130,0,0.3)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#2a2828;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:16px}
.app{width:100%;max-width:480px}
.header{background:var(--dark);padding:12px 16px 10px;border-radius:12px 12px 0 0;border-bottom:3px solid var(--orange)}
.header-logo{height:30px;display:block}
.header-sub{font-size:9px;color:rgba(255,255,255,0.4);margin-top:5px;letter-spacing:0.3px}
.header-sub b{color:var(--orange);font-weight:500}
.body{background:#fff;border:0.5px solid #d5d5d5;border-top:none;border-radius:0 0 12px 12px;padding:14px}
.status-bar{display:flex;align-items:center;gap:8px;padding:8px 11px;background:#f9f9f9;border:0.5px solid #eee;border-radius:8px;margin-bottom:12px;font-size:11px;color:#888}
.status-bar .dot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0;transition:background 0.3s}
.status-bar .dot.ok{background:#4caf50}
.status-bar .dot.err{background:#f44336}
.status-bar .dot.loading{background:var(--orange);animation:pulse 0.9s infinite}
.status-bar .msg{flex:1}
.status-bar .reload-btn{font-size:10px;padding:3px 8px;border-radius:5px;border:0.5px solid var(--oborder);background:#fff;color:var(--orange);cursor:pointer;font-weight:500;font-family:inherit;white-space:nowrap}
.status-bar .reload-btn:hover{background:var(--odim)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.tab-row{display:flex;gap:4px;margin-bottom:12px}
.tab-btn{flex:1;padding:8px;font-size:12px;border:0.5px solid #ddd;border-radius:8px;cursor:pointer;background:#f5f5f5;color:#666;font-weight:400;font-family:inherit;transition:all 0.12s}
.tab-btn.active{background:var(--dark);color:#fff;border-color:var(--dark);font-weight:500}
.tab-btn:not(.active):hover{border-color:#aaa;background:#efefef}
.search-row{display:flex;gap:6px;margin-bottom:8px}
.search-row input{flex:1;padding:8px 10px;font-size:13px;border:0.5px solid #ddd;border-radius:8px;background:#f9f9f9;color:#333;font-family:inherit}
.search-row input:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 2px var(--odim)}
.search-row select{padding:8px 6px;font-size:11px;border:0.5px solid #ddd;border-radius:8px;background:#f9f9f9;color:#333;font-family:inherit;max-width:130px}
.search-row select:focus{outline:none;border-color:var(--orange)}
.results-count{font-size:10px;color:#aaa;margin-bottom:6px}
.product-grid{display:flex;flex-direction:column;gap:6px;max-height:340px;overflow-y:auto;padding-right:2px}
.product-grid::-webkit-scrollbar{width:3px}
.product-grid::-webkit-scrollbar-thumb{background:var(--orange);border-radius:2px}
.product-card{border:0.5px solid #e8e8e8;border-radius:8px;padding:9px 11px;cursor:pointer;display:flex;align-items:center;gap:9px;background:#fff;transition:border-color 0.12s,background 0.12s}
.product-card:hover{border-color:#bbb;background:#fafafa}
.product-card.added{border-color:var(--orange);background:#fff8f0}
.prod-thumb{width:38px;height:38px;border-radius:6px;background:#f2f2f2;border:0.5px solid #e8e8e8;display:flex;align-items:center;justify-content:center;font-size:7px;color:#bbb;text-align:center;flex-shrink:0;font-family:monospace;line-height:1.3;padding:2px;word-break:break-all;overflow:hidden}
.prod-thumb img{width:100%;height:100%;object-fit:contain;border-radius:4px}
.prod-info{flex:1;min-width:0}
.prod-sku{font-size:10px;color:#aaa;font-family:monospace}
.prod-name{font-size:12px;font-weight:500;color:#222;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.prod-cat{font-size:10px;color:#bbb;margin-top:1px}
.prod-right{text-align:right;flex-shrink:0}
.prod-price{font-size:13px;font-weight:600;color:var(--dark)}
.prod-unit{font-size:9px;color:#ccc}
.add-btn{font-size:18px;color:#d0d0d0;flex-shrink:0;line-height:1;width:20px;text-align:center}
.product-card.added .add-btn{color:var(--orange);font-weight:700}
.no-results{font-size:12px;color:#bbb;text-align:center;padding:24px}
.quote-list{display:flex;flex-direction:column;gap:6px}
.quote-row{border:0.5px solid #e8e8e8;border-radius:8px;padding:10px 11px;background:#fff}
.qr-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:9px}
.qr-thumb{width:44px;height:44px;border-radius:6px;background:#f2f2f2;border:0.5px solid #e8e8e8;display:flex;align-items:center;justify-content:center;font-size:7px;color:#ccc;text-align:center;flex-shrink:0;font-family:monospace;line-height:1.3;padding:2px;word-break:break-all;overflow:hidden}
.qr-thumb img{width:100%;height:100%;object-fit:contain;border-radius:5px}
.qr-name{flex:1;font-size:12px;font-weight:500;color:#222;line-height:1.3}
.qr-sku{font-size:10px;color:#ccc;font-family:monospace}
.qr-remove{font-size:15px;color:#ccc;cursor:pointer;background:none;border:none;line-height:1;padding:0;font-family:inherit}
.qr-remove:hover{color:var(--orange)}
.qr-controls{display:grid;grid-template-columns:52px 1fr 68px 64px;gap:5px;align-items:end}
.qr-controls label{font-size:10px;color:#aaa;display:block;margin-bottom:3px}
.ctrl-input{width:100%;padding:5px 6px;font-size:12px;border:0.5px solid #ddd;border-radius:5px;background:#f9f9f9;color:#333;text-align:center;font-family:inherit}
.ctrl-input:focus{outline:none;border-color:var(--orange)}
.qr-trade{font-size:12px;font-weight:500;color:#333}
.qr-net{font-size:10px;color:#aaa;margin-top:1px}
.qr-total{font-size:13px;font-weight:600;color:var(--dark);text-align:right}
.qr-total-unit{font-size:9px;color:#ccc;text-align:right}
.qr-links{display:flex;gap:10px;margin-top:8px;padding-top:7px;border-top:0.5px solid #f0f0f0;flex-wrap:wrap}
.zc-link{font-size:10px;color:var(--orange);text-decoration:none;display:flex;align-items:center;gap:3px}
.zc-link:hover{text-decoration:underline}
.empty-state{text-align:center;padding:32px 16px;color:#ccc;font-size:12px}
.empty-icon{font-size:30px;margin-bottom:8px;opacity:0.4}
.global-disc-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#f9f9f9;border-radius:8px;margin-top:12px;border:0.5px solid #eee}
.global-disc-row label{font-size:12px;color:#666;flex:1}
.global-disc-row input{width:58px;padding:5px 7px;font-size:12px;border:0.5px solid #ddd;border-radius:5px;background:#fff;color:#333;text-align:center;font-family:inherit}
.global-disc-row input:focus{outline:none;border-color:var(--orange)}
.pct{font-size:12px;color:#aaa}
.summary-box{background:var(--dark);border-radius:8px;padding:12px 14px;margin-top:10px;color:#fff;border-left:3px solid var(--orange)}
.sum-line{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.sum-label{font-size:12px;color:rgba(255,255,255,0.5)}
.sum-val{font-size:13px;font-weight:500}
.sum-disc{color:#ffb04d}
.sum-total{display:flex;justify-content:space-between;align-items:baseline;border-top:0.5px solid rgba(255,255,255,0.12);margin-top:8px;padding-top:8px}
.sum-total .tl{font-size:13px;font-weight:500}
.sum-total .tv{font-size:22px;font-weight:700;color:var(--orange)}
.sum-vat{font-size:10px;color:rgba(255,255,255,0.35);margin-top:4px;text-align:right}
.action-row{display:flex;gap:8px;margin-top:10px}
.action-btn{flex:1;padding:9px 8px;font-size:12px;border-radius:8px;cursor:pointer;font-weight:500;border:0.5px solid #ddd;background:#fff;color:#444;display:flex;align-items:center;justify-content:center;gap:5px;font-family:inherit;transition:all 0.1s}
.action-btn:hover{background:#f5f5f5;border-color:#bbb}
.action-btn.primary{background:var(--orange);border-color:var(--orange);color:#fff}
.action-btn.primary:hover{background:#e07000}
.action-btn.danger{color:#e63946;border-color:#fcc}
.action-btn.danger:hover{background:#fff5f5}
.badge{display:inline-flex;align-items:center;justify-content:center;background:var(--orange);color:#fff;border-radius:99px;font-size:9px;padding:1px 6px;margin-left:4px;min-width:18px;height:16px;font-weight:600}
input[type=number]::-webkit-inner-spin-button{opacity:1}
@media(max-width:400px){body{padding:0;background:#fff}.app{max-width:100%}.header{border-radius:0}.body{border-radius:0;border-left:none;border-right:none}}
</style>
</head>

  </div>
  <div class="body">

    <div class="status-bar">
      <div class="dot loading" id="status-dot"></div>
      <span class="msg" id="status-msg">Loading price list…</span>
      <button class="reload-btn" onclick="loadCSV()">↻ Refresh</button>
    </div>

    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('search')" id="tab-search">Products</button>
      <button class="tab-btn" onclick="switchTab('quote')" id="tab-quote">Quote <span id="qbadge"></span></button>
    </div>

    <div id="panel-search">
      <div class="search-row">
        <input type="text" id="search-input" placeholder="Search name or SKU…" oninput="renderProducts()" autocomplete="off" />
        <select id="cat-filter" onchange="renderProducts()"><option value="">All ranges</option></select>
      </div>
      <div class="results-count" id="results-count"></div>
      <div class="product-grid" id="product-grid"></div>
    </div>

    <div id="panel-quote" style="display:none">
      <div class="quote-list" id="quote-list"></div>
      <div id="quote-empty" class="empty-state" style="display:none">
        <div class="empty-icon">📋</div>
        No products added yet.<br>Search the Products tab to build your quote.
      </div>
      <div id="quote-footer" style="display:none">
        <div class="global-disc-row">
          <label>Global discount — applies to all lines</label>
          <input type="number" id="global-disc" min="0" max="80" step="0.5" value="0" oninput="renderQuote()" />
          <span class="pct">%</span>
        </div>
        <div class="summary-box" id="summary-box"></div>
        <div class="action-row">
          <button class="action-btn primary" onclick="copyQuote()" id="copy-btn">📋 Copy quote</button>
          <button class="action-btn danger" onclick="clearQuote()">🗑 Clear</button>
        </div>
      </div>
    </div>

  </div>
</div>
<script>
let PRODUCTS = [];
let quoteItems = {};

const CSV_URL = 'zc-prequote-products.csv';

function setStatus(state, msg) {
  document.getElementById('status-dot').className = 'dot ' + state;
  document.getElementById('status-msg').textContent = msg;
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const results = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = [];
    let cur = '', inQ = false;
    for (let c = 0; c < lines[i].length; c++) {
      const ch = lines[i][c];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur);
    // Columns: SKU, Name, Cat, Price, URL, Datasheet, Image
    const [sku, name, cat, priceStr, url, ds, img] = cols;
    if (!sku || !sku.trim() || !name || !cat) continue;
    const price = parseFloat(priceStr);
    if (!price || price <= 0) continue;
    results.push({
      sku: sku.trim(), name: name.trim(), cat: cat.trim(),
      price: Math.round(price * 100) / 100,
      url: (url||'').trim(),
      ds: (ds||'').trim(),
      img: (img||'').trim()
    });
  }
  return results;
}

async function loadCSV() {
  setStatus('loading', 'Loading price list…');
  try {
    const resp = await fetch(CSV_URL + '?v=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const parsed = parseCSV(await resp.text());
    if (!parsed.length) throw new Error('No products found in CSV');
    PRODUCTS = parsed;
    rebuildCatFilter();
    renderProducts();
    const t = new Date().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
    setStatus('ok', parsed.length + ' products · ' + t);
  } catch(e) {
    setStatus('err', 'Could not load — ' + e.message);
  }
}

function rebuildCatFilter() {
  const sel = document.getElementById('cat-filter');
  const prev = sel.value;
  sel.innerHTML = '<option value="">All ranges</option>';
  [...new Set(PRODUCTS.map(p => p.cat))].sort().forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    if (c === prev) o.selected = true;
    sel.appendChild(o);
  });
}

function thumb(imgUrl, sku, size) {
  if (imgUrl) {
    return `<img src="${imgUrl}" alt="${sku}" loading="lazy" onerror="this.parentNode.innerHTML='${sku.substring(0,9)}'" />`;
  }
  return sku.substring(0,9);
}

function esc(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function renderProducts() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const cat = document.getElementById('cat-filter').value;
  const filtered = PRODUCTS.filter(p =>
    (!q || p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q)) &&
    (!cat || p.cat === cat)
  );
  document.getElementById('results-count').textContent =
    filtered.length + ' product' + (filtered.length !== 1 ? 's' : '');
  const grid = document.getElementById('product-grid');
  if (!filtered.length) { grid.innerHTML = '<div class="no-results">No products match.</div>'; return; }
  grid.innerHTML = filtered.map(p => {
    const added = !!quoteItems[p.sku];
    return `<div class="product-card${added?' added':''}" onclick="toggleProduct('${esc(p.sku)}')">
      <div class="prod-thumb">${thumb(p.img, p.sku)}</div>
      <div class="prod-info">
        <div class="prod-sku">${p.sku}</div>
        <div class="prod-name">${p.name}</div>
        <div class="prod-cat">${p.cat}</div>
      </div>
      <div class="prod-right">
        <div class="prod-price">£${p.price.toFixed(2)}</div>
        <div class="prod-unit">trade ea.</div>
      </div>
      <div class="add-btn">${added?'✓':'+'}</div>
    </div>`;
  }).join('');
}

function toggleProduct(sku) {
  const p = PRODUCTS.find(x => x.sku === sku);
  if (!p) return;
  if (quoteItems[sku]) delete quoteItems[sku];
  else quoteItems[sku] = {...p, qty:1, lineDisc:0};
  updateBadge(); renderProducts(); renderQuote();
}

function updateBadge() {
  const n = Object.keys(quoteItems).length;
  document.getElementById('qbadge').innerHTML = n > 0 ? `<span class="badge">${n}</span>` : '';
}

function renderQuote() {
  const items = Object.values(quoteItems);
  const qList = document.getElementById('quote-list');
  const qEmpty = document.getElementById('quote-empty');
  const qFooter = document.getElementById('quote-footer');
  if (!items.length) { qList.innerHTML=''; qEmpty.style.display='block'; qFooter.style.display='none'; return; }
  qEmpty.style.display='none'; qFooter.style.display='block';
  const gd = Math.min(80, Math.max(0, parseFloat(document.getElementById('global-disc').value)||0));
  let subtotal=0, totalDisc=0;
  qList.innerHTML = items.map(item => {
    const ld = Math.min(80, Math.max(0, item.lineDisc||0));
    const combined = 1-(1-ld/100)*(1-gd/100);
    const unitNet = item.price*(1-combined);
    const lineTotal = unitNet*(item.qty||1);
    subtotal += lineTotal; totalDisc += (item.price*(item.qty||1) - lineTotal);
    const discShown = combined>0?`<div class="qr-net">Net: £${unitNet.toFixed(2)} (${(combined*100).toFixed(1)}% off)</div>`:'';
    const urlLink = item.url ? `<a href="${item.url}" class="zc-link" target="_blank">🌐 Product page</a>` : '';
    const dsLink = item.ds ? `<a href="${item.ds}" class="zc-link" target="_blank">📄 Datasheet</a>` : '';
    const imgLink = item.img ? `<a href="${item.img}" class="zc-link" target="_blank">🖼 Image</a>` : '';
    return `<div class="quote-row">
      <div class="qr-top">
        <div class="qr-thumb">${thumb(item.img, item.sku)}</div>
        <div style="flex:1;min-width:0"><div class="qr-name">${item.name}</div><div class="qr-sku">${item.sku} · ${item.cat}</div></div>
        <button class="qr-remove" onclick="removeItem('${esc(item.sku)}')">✕</button>
      </div>
      <div class="qr-controls">
        <div><label>Qty</label><input class="ctrl-input" type="number" min="1" step="1" value="${item.qty}" onchange="updateQty('${esc(item.sku)}',this.value)" /></div>
        <div style="padding-bottom:2px"><label>Trade price</label><div class="qr-trade">£${item.price.toFixed(2)}</div>${discShown}</div>
        <div><label>Line disc %</label><input class="ctrl-input" type="number" min="0" max="80" step="0.5" value="${item.lineDisc||0}" onchange="updateDisc('${esc(item.sku)}',this.value)" /></div>
        <div><label style="text-align:right">Line total</label><div class="qr-total">£${lineTotal.toFixed(2)}</div><div class="qr-total-unit">£${unitNet.toFixed(2)} ea.</div></div>
      </div>
      ${urlLink||dsLink||imgLink?`<div class="qr-links">${urlLink}${dsLink}${imgLink}</div>`:''}
    </div>`;
  }).join('');
  const vat = subtotal*1.2;
  document.getElementById('summary-box').innerHTML = `
    <div class="sum-line"><span class="sum-label">Subtotal (trade)</span><span class="sum-val">£${(subtotal+totalDisc).toFixed(2)}</span></div>
    ${totalDisc>0?`<div class="sum-line"><span class="sum-label">Discount applied</span><span class="sum-val sum-disc">−£${totalDisc.toFixed(2)}</span></div>`:''}
    ${gd>0?`<div class="sum-line"><span class="sum-label" style="font-size:10px;opacity:0.5">Global ${gd}% on all lines</span><span></span></div>`:''}
    <div class="sum-total"><span class="tl">Net total</span><span class="tv">£${subtotal.toFixed(2)}</span></div>
    <div class="sum-vat">+ VAT £${(subtotal*0.2).toFixed(2)} &nbsp;|&nbsp; Inc. VAT £${vat.toFixed(2)}</div>`;
}

function removeItem(sku){delete quoteItems[sku];updateBadge();renderProducts();renderQuote();}
function updateQty(sku,val){if(quoteItems[sku]){quoteItems[sku].qty=Math.max(1,parseInt(val)||1);renderQuote();}}
function updateDisc(sku,val){if(quoteItems[sku]){quoteItems[sku].lineDisc=Math.min(80,Math.max(0,parseFloat(val)||0));renderQuote();}}

function clearQuote(){
  if(!confirm('Clear all items?'))return;
  quoteItems={};updateBadge();renderProducts();renderQuote();
}

function switchTab(tab){
  document.getElementById('panel-search').style.display=tab==='search'?'block':'none';
  document.getElementById('panel-quote').style.display=tab==='quote'?'block':'none';
  document.getElementById('tab-search').className='tab-btn'+(tab==='search'?' active':'');
  document.getElementById('tab-quote').className='tab-btn'+(tab==='quote'?' active':'');
}

function copyQuote(){
  const items=Object.values(quoteItems);
  if(!items.length)return;
  const gd=Math.min(80,Math.max(0,parseFloat(document.getElementById('global-disc').value)||0));
  const d=new Date().toLocaleDateString('en-GB');
  let out='ZIP-CLIP — PREQUOTE\n'+d+'\n'+'═'.repeat(58)+'\n\n';
  let total=0;
  items.forEach(item=>{
    const ld=item.lineDisc||0;
    const combined=1-(1-ld/100)*(1-gd/100);
    const unitNet=item.price*(1-combined);
    const lineTotal=unitNet*(item.qty||1);
    total+=lineTotal;
    const ds=combined>0?` (${(combined*100).toFixed(1)}% disc.)`:'';
    out+=`${item.sku}\n${item.name}\nQty: ${item.qty}  |  Trade: £${item.price.toFixed(2)}  |  Net: £${unitNet.toFixed(2)}${ds}  |  Line: £${lineTotal.toFixed(2)}\n\n`;
  });
  out+='─'.repeat(58)+'\n';
  out+=`NET TOTAL:    £${total.toFixed(2)}\n+ VAT (20%):  £${(total*0.2).toFixed(2)}\nINC. VAT:     £${(total*1.2).toFixed(2)}\n\n`;
  out+='2026 UK trade prices. Subject to confirmation. Internal use only.';
  navigator.clipboard.writeText(out).then(()=>{
    const btn=document.getElementById('copy-btn');
    btn.textContent='✓ Copied!';
    setTimeout(()=>{btn.innerHTML='📋 Copy quote';},2500);
  }).catch(()=>alert(out));
}

loadCSV();
</script>
